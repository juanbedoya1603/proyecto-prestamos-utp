<div class="app-layout" [class.collapsed]="collapsed()">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-container">
        <div class="logo-icon">
          <mat-icon>school</mat-icon>
        </div>
        @if (!collapsed()) {
          <span class="logo-text">Préstamos UTP</span>
        }
      </div>
      <button mat-icon-button class="toggle-btn" (click)="toggleSidenav()">
        <mat-icon>{{ collapsed() ? 'chevron_right' : 'chevron_left' }}</mat-icon>
      </button>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-item" [matTooltip]="collapsed() ? item.label : ''" matTooltipPosition="right">
          <mat-icon>{{ item.icon }}</mat-icon>
          @if (!collapsed()) {
            <span>{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <button class="nav-item logout-btn" (click)="logout()" [matTooltip]="collapsed() ? 'Cerrar Sesión' : ''" matTooltipPosition="right">
        <mat-icon>logout</mat-icon>
        @if (!collapsed()) {
          <span>Cerrar Sesión</span>
        }
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <h2 class="topbar-title">Panel de Administración</h2>
      </div>
      <div class="topbar-right">
        <div class="user-info">
          <div class="user-avatar">
            <mat-icon>person</mat-icon>
          </div>
          <div class="user-details">
            <span class="user-name">{{ userName }}</span>
            <span class="user-role">{{ userRole }}</span>
          </div>
        </div>
      </div>
    </header>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
